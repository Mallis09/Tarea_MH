<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="author" content="Maricela Hernandez">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tareas</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="stylesheet" href="tareas.css">

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <header class="logo-personal">
    <span class="m">M</span><span class="h">H</span>
  </header>

  <h1>Lista de Tareas</h1>

  <form action="#" id="usuario">
    <input type="text" id="inputTarea" placeholder="Escriba la tarea ..." autofocus>
    <input type="submit" value="+" id="agregar">
  </form>

  <section class="lista" id="contLista">
    <article class="tareas" id="1">
      <label>
        <input type="checkbox">
        Tarea 1
      </label>

      <i class="fa-solid fa-trash borrar"></i>
    </article>
  </section>

  <section id="estadistica">
    Tareas pendientes: 0 Completadas: 0
  </section>

  <footer>
    <p>&copy; 2026 Maricela Hernandez - Todos los derechos reservados</p>

    <nav>
      <a href="#proyectos">Proyectos</a> |
      <a href="#contacto">Contacto</a>
    </nav>
  </footer>

  <script src="tarea.js"></script>

</body>

</html>
